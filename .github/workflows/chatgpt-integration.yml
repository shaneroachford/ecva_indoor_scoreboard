name: ChatGPT Repo Check

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  chatgpt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OpenAI SDK
        run: pip install openai

      - name: Run ChatGPT check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python - <<'PY'
          from openai import OpenAI
          import os

          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])

          response = client.responses.create(
              model="gpt-4.1-mini",
              input="Review this ECVA indoor scoreboard repo at a high level and suggest next improvement steps."
          )

          print(response.output_text)
          PY
